<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>सत्यबोधः — संस्कृत AI गुरु</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0F0C0A; }
  #app { min-height: 100vh; }

  .sb-root {
    --bg: #1C1714;
    --bg-raised: #261F1A;
    --gold: #D4A24C;
    --terracotta: #C2542D;
    --cream: #F2E8D5;
    --bn-purple: #7A4F9E;
    --bn-green: #5C7A4B;
    --line: rgba(242,232,213,0.14);
    background: var(--bg);
    color: var(--cream);
    font-family: 'Tiro Devanagari Hindi', 'Noto Sans Devanagari', 'Nirmala UI', Georgia, serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }
  .sb-root .latin-text { font-family: Georgia, 'Times New Roman', serif; }

  .sb-header { background: linear-gradient(180deg, #2A2218 0%, var(--bg) 100%); border-bottom: 1px solid var(--line); padding: 14px 16px 0; position: sticky; top: 0; z-index: 5; }
  .sb-header-row { display: flex; align-items: center; gap: 10px; }
  .sb-brand { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .sb-brand-om { font-size: 22px; color: var(--gold); width: 34px; height: 34px; border: 1.5px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sb-brand-text { display: flex; flex-direction: column; min-width: 0; }
  .sb-brand-title { font-size: 19px; color: var(--cream); letter-spacing: 0.02em; }
  .sb-brand-sub { font-size: 11.5px; color: rgba(242,232,213,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .icon-btn { background: rgba(242,232,213,0.06); border: 1px solid var(--line); color: var(--cream); width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 16px; }
  .icon-btn:hover { background: rgba(242,232,213,0.12); }
  .icon-btn:focus-visible, .primary-btn:focus-visible, .secondary-btn:focus-visible, .profile-card:focus-visible, .lesson-row:focus-visible, .quiz-option:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .seto-bar { display: grid; grid-template-columns: repeat(4, 1fr); margin-top: 12px; overflow: hidden; }
  .seto-bar span { text-align: center; font-size: 10.5px; padding: 5px 0; letter-spacing: 0.08em; font-family: Georgia, serif; }
  .seto-bar span:nth-child(1) { background: var(--gold); color: #1C1714; }
  .seto-bar span:nth-child(2) { background: var(--terracotta); color: #1C1714; }
  .seto-bar span:nth-child(3) { background: var(--bn-green); color: #1C1714; }
  .seto-bar span:nth-child(4) { background: var(--bn-purple); color: #F2E8D5; }

  .content-pad { padding: 16px; padding-bottom: 28px; }
  .center-pad { padding: 60px 16px; text-align: center; }
  .om-spinner { font-size: 38px; color: var(--gold); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
  .loading-text { margin-top: 14px; font-size: 13px; color: rgba(242,232,213,0.65); }

  .profile-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
  .profile-card { display: flex; align-items: center; gap: 11px; background: var(--bg-raised); border: 1px solid var(--line); border-radius: 10px; padding: 11px 12px; cursor: pointer; text-align: left; width: 100%; color: inherit; font: inherit; }
  .profile-card:hover { border-color: var(--gold); }
  .profile-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(212,162,76,0.15); color: var(--gold); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  .profile-card-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .profile-card-name { font-size: 15px; color: var(--cream); }
  .profile-card-meta { font-size: 11.5px; color: rgba(242,232,213,0.55); }
  .profile-card-arrow { color: rgba(242,232,213,0.4); flex-shrink: 0; }

  .new-profile-box { background: var(--bg-raised); border: 1px dashed var(--line); border-radius: 12px; padding: 16px; }
  .section-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--gold); margin: 0 0 10px; letter-spacing: 0.02em; font-family: Georgia, serif; }
  .text-input { width: 100%; background: var(--bg); border: 1px solid var(--line); color: var(--cream); padding: 10px 12px; border-radius: 8px; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
  .text-input:focus { outline: none; border-color: var(--gold); }
  .class-select-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .class-select-label { font-size: 13px; color: rgba(242,232,213,0.75); flex-shrink: 0; }
  .class-select { flex: 1; background: var(--bg); border: 1px solid var(--line); color: var(--cream); padding: 9px 10px; border-radius: 8px; font-size: 13px; font-family: inherit; }
  .primary-btn { width: 100%; background: var(--gold); color: #1C1714; border: none; border-radius: 9px; padding: 12px 16px; font-size: 14.5px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: Georgia, serif; }
  .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .primary-btn:not(:disabled):hover { background: #E0B265; }
  .secondary-btn { width: 100%; background: transparent; color: var(--cream); border: 1px solid var(--line); border-radius: 9px; padding: 11px 16px; font-size: 14px; cursor: pointer; margin-top: 8px; font-family: inherit; }
  .secondary-btn:hover { border-color: var(--gold); }

  .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
  .stat-cell { background: var(--bg-raised); border: 1px solid var(--line); border-radius: 10px; padding: 10px 6px; text-align: center; }
  .stat-num { display: block; font-size: 20px; color: var(--gold); font-weight: 600; }
  .stat-label { font-size: 9.5px; color: rgba(242,232,213,0.55); line-height: 1.3; }

  .notice-box { display: flex; gap: 8px; align-items: flex-start; background: rgba(212,162,76,0.08); border: 1px solid rgba(212,162,76,0.3); color: var(--gold); border-radius: 9px; padding: 10px 12px; font-size: 12px; margin-bottom: 16px; line-height: 1.5; }

  .chapter-banner { background: linear-gradient(135deg, rgba(212,162,76,0.1), rgba(194,84,45,0.08)); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 18px; text-align: center; }
  .chapter-eyebrow { font-size: 11px; color: rgba(242,232,213,0.55); letter-spacing: 0.05em; }
  .chapter-title { font-size: 24px; color: var(--gold); margin: 6px 0 4px; }
  .chapter-sub { font-size: 12px; color: rgba(242,232,213,0.7); }

  .lesson-list { display: flex; flex-direction: column; gap: 8px; }
  .lesson-row { display: flex; align-items: center; gap: 12px; background: var(--bg-raised); border: 1px solid var(--line); border-radius: 10px; padding: 12px; cursor: pointer; text-align: left; width: 100%; color: inherit; font: inherit; }
  .lesson-row:hover { border-color: var(--gold); }
  .lesson-num { width: 28px; height: 28px; border-radius: 50%; background: rgba(212,162,76,0.15); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; font-family: Georgia, serif; }
  .lesson-row-text { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .lesson-row-title { font-size: 15.5px; color: var(--cream); }
  .lesson-row-sub { font-size: 11.5px; color: rgba(242,232,213,0.55); }
  .lesson-row-arrow { color: rgba(242,232,213,0.4); flex-shrink: 0; }
  .lesson-badge { font-size: 11px; color: var(--bn-green); display: flex; align-items: center; gap: 4px; background: rgba(92,122,75,0.15); padding: 4px 8px; border-radius: 20px; flex-shrink: 0; }

  .save-warning { font-size: 11.5px; color: var(--terracotta); margin-top: 14px; text-align: center; }

  .lesson-head { margin-bottom: 16px; }
  .lesson-head-eyebrow { font-size: 11px; color: rgba(242,232,213,0.5); letter-spacing: 0.05em; }
  .lesson-head-title { font-size: 23px; color: var(--gold); margin-top: 4px; }

  .sutra-box { background: var(--bg-raised); border: 1px solid rgba(212,162,76,0.3); border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; position: relative; }
  .sutra-label { font-size: 10.5px; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; font-family: Georgia, serif; }
  .sutra-text { font-size: 16px; color: var(--cream); margin: 8px 0 4px; line-height: 1.6; }
  .sutra-translit { font-size: 11.5px; color: rgba(242,232,213,0.5); font-style: italic; font-family: Georgia, serif; }

  .bridge-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }
  .lang-block { border-left: 3px solid; padding: 4px 0 4px 12px; }
  .lang-tag { font-size: 10.5px; letter-spacing: 0.08em; display: block; margin-bottom: 3px; font-family: Georgia, serif; text-transform: uppercase; }
  .lang-block p { font-size: 14.5px; line-height: 1.65; color: var(--cream); margin: 0; }

  .glossary-wrap { background: var(--bg-raised); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .glossary-head, .glossary-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; padding: 9px 10px; }
  .glossary-head { background: rgba(212,162,76,0.1); font-size: 10px; color: var(--gold); letter-spacing: 0.04em; font-family: Georgia, serif; }
  .glossary-row { border-top: 1px solid var(--line); font-size: 12px; }
  .glossary-row span { color: rgba(242,232,213,0.85); overflow-wrap: break-word; }

  .tanda-box { background: linear-gradient(135deg, rgba(122,79,158,0.1), rgba(92,122,75,0.08)); border: 1px solid rgba(122,79,158,0.3); border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; }
  .tanda-label { font-size: 11px; color: var(--bn-purple); letter-spacing: 0.04em; font-family: Georgia, serif; display: block; margin-bottom: 8px; }
  .tanda-text { font-size: 14px; color: var(--cream); line-height: 1.6; margin: 0 0 6px; }
  .tanda-text-sub { font-size: 12.5px; color: rgba(242,232,213,0.7); line-height: 1.55; margin: 0 0 4px; }
  .tanda-text-sub.bn { color: var(--bn-purple); }

  .formula-box { display: flex; flex-direction: column; align-items: center; gap: 2px; background: var(--bg-raised); border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 22px; text-align: center; }
  .formula-sa { font-size: 17px; color: var(--gold); }
  .formula-en { font-size: 12px; color: rgba(242,232,213,0.6); font-family: Georgia, serif; }

  .quiz-section { border-top: 1px solid var(--line); padding-top: 18px; }
  .quiz-q { margin-bottom: 16px; }
  .quiz-q-text { font-size: 15px; color: var(--cream); margin: 0 0 3px; }
  .quiz-q-text-sub { font-size: 11.5px; color: rgba(242,232,213,0.55); margin: 0 0 10px; }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-option { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; position: relative; background: var(--bg-raised); border: 1.5px solid var(--line); border-radius: 9px; padding: 10px 36px 10px 12px; cursor: pointer; text-align: left; width: 100%; color: inherit; font: inherit; }
  .quiz-option span:first-child { font-size: 14px; color: var(--cream); }
  .quiz-option-sub { font-size: 11px; color: rgba(242,232,213,0.5); }
  .quiz-option.selected { border-color: var(--gold); background: rgba(212,162,76,0.08); }
  .quiz-option.correct { border-color: var(--bn-green); background: rgba(92,122,75,0.12); }
  .quiz-option.incorrect { border-color: var(--terracotta); background: rgba(194,84,45,0.1); }
  .quiz-option:disabled { cursor: default; }
  .quiz-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); }
  .quiz-option.correct .quiz-icon { color: var(--bn-green); }
  .quiz-option.incorrect .quiz-icon { color: var(--terracotta); }

  .quiz-result-box { margin-top: 4px; text-align: center; }
  .quiz-result-box p { font-size: 15px; color: var(--cream); margin-bottom: 12px; }

  @media (prefers-reduced-motion: reduce) { .om-spinner { animation: none; } }
</style>
</head>
<body>
<div id="app">
  <div class="sb-root">
    <div class="center-pad">
      <div class="om-spinner">ॐ</div>
      <p class="loading-text">सत्यबोधः प्रबोधते... (सत्यबोध जग रहा है...)</p>
    </div>
  </div>
</div>

<script>
"use strict";
// ===========================================================================
// सत्यबोध — Sanskrit-rooted four-language AI Guru
// Pure vanilla JavaScript, zero external dependencies, fully offline-capable.
// Data lives in CURRICULUM; UI code below never needs to change to add
// new classes/subjects/chapters/lessons.
// ===========================================================================

var STORAGE_KEY_PROFILES = "satyabodh:profiles";
var STORAGE_KEY_ACTIVE = "satyabodh:active-profile-id";

var CURRICULUM = {
  id: "class8-science-force",
  classLevel: 8,
  subject: { sa: "विज्ञानम्", hi: "विज्ञान", en: "Science", bn: "विज्ञान" },
  chapter: { sa: "बलं गतिः च", hi: "बल और गति", en: "Force and Motion", bn: "ताकत आणि हलचाल" },
  lessons: [
    {
      id: "l1",
      title: { sa: "बलं किम्?", hi: "बल किसे कहते हैं?", en: "What is Force?", bn: "ताकत काय छे?" },
      sutra: { text: "बलं नाम सा शक्तिः या वस्तुनः गतिं स्थितिं वा परिवर्तयति।", translit: "balaṁ nāma sā śaktiḥ yā vastunaḥ gatiṁ sthitiṁ vā parivartayati" },
      content: {
        sa: "बलं नाम सा शक्तिः या वस्तुनः गतिं स्थितिं वा परिवर्तयति। आकर्षणेन (pull) अपकर्षणेन (push) वा बलं प्रयुज्यते।",
        hi: "बल वह कारण है जो किसी वस्तु की गति या स्थिति बदल देता है — धकेलने (push) या खींचने (pull) से।",
        en: "Force is what changes the motion or state of rest of an object — by pushing or pulling it.",
        bn: "गोरमाटी, बल छे सोय ताकत जे चीजेन हलाव छे या रोक छे। जणे बैलगाडीन धकेल देवा, वली चीज चाल पड़ जाय — आहीज बल छे, भाई।"
      },
      glossary: [
        { sa: "बलम्", hi: "बल", en: "Force", bn: "ताकत" },
        { sa: "गतिः", hi: "गति", en: "Motion", bn: "हलचाल" },
        { sa: "स्थितिः", hi: "स्थिति (विरामावस्था)", en: "Rest / State", bn: "थमाव" }
      ],
      tandaExample: {
        sa: "यथा तांडे बैलगाडीं चालयितुं श्रमिकः बलं प्रयुङ्क्ते, तथा बलं वस्तूनि चालयति।",
        hi: "जैसे तांडे में बैलगाड़ी चलाने के लिए मजदूर बल लगाता है, वैसे ही बल वस्तुओं को चलाता है।",
        en: "Just as a worker in the tanda applies force to move a bullock cart, force is what moves objects.",
        bn: "तांडा मा बैलगाडी हलावा खातर मजूर ताकत लगाव छे, ईज रीत सी बल चीजेन हलाव छे।"
      },
      formula: { sa: "बलम् = द्रव्यमानम् × त्वरणम्", en: "F = m × a" },
      quiz: [{
        q: { sa: "यदि गाडी न चलति, किं कर्तव्यम्?", hi: "यदि गाड़ी नहीं चल रही है, तो क्या करना चाहिए?", en: "If a cart is not moving, what should be applied?", bn: "जणे गाडी नी चालती, तो काय करवू?" },
        options: [
          { sa: "बलं प्रयोक्तव्यम् (धक्का/कर्षण)", hi: "बल लगाना चाहिए (धक्का या खींचना)", en: "Apply force (push or pull)", bn: "ताकत लगाव (धकेलणो/खेंचणो)" },
          { sa: "प्रतीक्षा करणीया", hi: "केवल प्रतीक्षा करनी चाहिए", en: "Just wait", bn: "बस राह जोवणी" }
        ],
        correct: 0
      }]
    },
    {
      id: "l2",
      title: { sa: "बलस्य प्रकाराः", hi: "बल के प्रकार", en: "Types of Force", bn: "ताकतेरा भेद" },
      sutra: { text: "स्पर्शजं बलम्, अस्पर्शजं बलं च — द्विविधं बलम्।", translit: "sparśajaṁ balam, asparśajaṁ balaṁ ca — dvividhaṁ balam" },
      content: {
        sa: "बलं द्विविधम् — स्पर्शजं बलम् (touch के द्वारा, यथा धक्का) तथा अस्पर्शजं बलम् (touch विना, यथा गुरुत्वाकर्षणम्, चुम्बकीयबलम्)।",
        hi: "बल दो प्रकार के होते हैं — स्पर्श बल (जैसे धकेलना, खींचना) और अस्पर्श बल (जैसे गुरुत्वाकर्षण, चुंबकीय बल — जिनमें छूना आवश्यक नहीं)।",

        { sa: "अस्पर्शजं बलम्", hi: "अस्पर्श बल", en: "Non-Contact Force", bn: "बिन छुयाँ वाळी ताकत" },
        { sa: "गुरुत्वाकर्षणम्", hi: "गुरुत्वाकर्षण", en: "Gravity", bn: "धरतीअेर खिंचाव" }
      ],
      tandaExample: {
        sa: "तांडे चुम्बकेन लोहखण्डस्य आकर्षणं अस्पर्शजबलस्य उदाहरणम्।",
        hi: "तांडे में चुंबक से लोहे के टुकड़े का खिंचना अस्पर्श बल का उदाहरण है।",

        bn: "तांडा मा चुम्बक सी लोहाएर टुकड़ो खिंचणो — ईज छे बिन छुयाँ वाळी ताकतेर मिसाल।"
      },
      formula: { sa: "बलप्रकारौ: स्पर्शजम्, अस्पर्शजम्", en: "Types: Contact, Non-Contact" },
      quiz: [{
        q: { sa: "गुरुत्वाकर्षणं कीदृशं बलम्?", hi: "गुरुत्वाकर्षण किस प्रकार का बल है?", en: "What kind of force is gravity?", bn: "धरतीअेर खिंचाव कुणसी ताकत छे?" },
        options: [
          { sa: "अस्पर्शजं बलम्", hi: "अस्पर्श बल", en: "Non-Contact Force", bn: "बिन छुयाँ वाळी ताकत" },
          { sa: "स्पर्शजं बलम्", hi: "स्पर्श बल", en: "Contact Force", bn: "छुई वाळी ताकत" }
        ],
        correct: 0
      }]
    },
